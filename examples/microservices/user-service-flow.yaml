flow:
  name: "User Service - Auth & CRUD"
  description: "Auto-generated E2E flow for user-service. Covers HTTP endpoints, database state, and event verification."

  setup:
    - id: setup_log
      action: log
      config:
        message: "Starting E2E tests for user-service"


  steps:
    - id: health_check
      action: http_request
      config:
        method: "GET"
        url: "http://localhost:5001/health"
      assert:
        - "status == 200"

    - id: create_user
      action: http_request
      config:
        body:
          email: "test-{{RANDOM_ID}}@example.com"
          name: "Test User {{RANDOM_ID}}"
        method: "POST"
        url: "http://localhost:5001/api/v1/users"
        headers:
          Content-Type: "application/json"
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        user_id: "$.body.id"

    - id: list_users
      action: http_request
      config:
        method: "GET"
        url: "http://localhost:5001/api/v1/users"
      assert:
        - "status == 200"

    - id: get_user
      action: http_request
      config:
        method: "GET"
        url: "http://localhost:5001/api/v1/users/{{user_id}}"
      assert:
        - "status == 200"
        - "body.id != nil"

    - id: login
      action: http_request
      config:
        method: "POST"
        url: "http://localhost:5001/api/v1/auth/login"
        headers:
          Content-Type: "application/json"
        body:
          name: "Test Login {{RANDOM_ID}}"
          email: "test-{{RANDOM_ID}}@example.com"
      assert:
        - "status < 500"

    - id: verify
      action: http_request
      config:
        method: "GET"
        url: "http://localhost:5001/api/v1/auth/verify"
      assert:
        - "status < 500"

    - id: verify_db_user
      action: database_query
      config:
        connection: "postgres://root:admin@localhost:5432/postgres?sslmode=disable"
        query: "SELECT COUNT(*) as count FROM user_service.users"
      assert:
        - "row_count >= 1"

    - id: verify_event_user_created
      action: kafka_consumer
      config:
        brokers: "localhost:9092"
        topic: "user.created"
        group_id: "testmesh-e2e-verifier"
        timeout: "10s"
      assert:
        - "len(messages) > 0"

    - id: verify_event_user_login
      action: kafka_consumer
      config:
        brokers: "localhost:9092"
        topic: "user.login"
        group_id: "testmesh-e2e-verifier"
        timeout: "10s"
      assert:
        - "len(messages) > 0"

    - id: not_found_user
      action: http_request
      config:
        method: "GET"
        url: "http://localhost:5001/api/v1/users/00000000-0000-0000-0000-000000000000"
      assert:
        - "status == 404 || status == 400"

    - id: bad_request_user
      action: http_request
      config:
        method: "POST"
        url: "http://localhost:5001/api/v1/users"
        headers:
          Content-Type: "application/json"
        body:
      assert:
        - "status == 400 || status == 422"

