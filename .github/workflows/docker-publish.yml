name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. v1.0.0). Defaults to "latest"'
        required: false
        default: 'latest'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/testmesh

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.combined
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.event.inputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: VERSION=${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
