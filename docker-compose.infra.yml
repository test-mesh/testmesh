version: '3.8'

# Infrastructure Services (PostgreSQL, Redis, Kafka)
# Use this for local development if you don't have these services already running
# Run with: docker-compose -f docker-compose.infra.yml up

services:
  # PostgreSQL Database
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: testmesh-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testmesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testmesh_dev}
      POSTGRES_DB: ${POSTGRES_DB:-testmesh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testmesh-network

  # Redis (Caching + Distributed Locking)
  redis:
    image: redis:7-alpine
    container_name: testmesh-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testmesh-network

  # Kafka (Event Streaming) - Optional
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: testmesh-kafka
    profiles:
      - kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9093:9093"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9093 --list
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - testmesh-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  testmesh-network:
    driver: bridge
    name: testmesh-network
