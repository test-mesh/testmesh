flow:
  name: "Notification Service - Unread for Nonexistent User"
  description: "Queries unread notifications for user with no notifications"

  steps:
    - id: get_unread_empty
      action: http_request
      config:
        method: GET
        url: "http://localhost:5004/api/v1/notifications/00000000-0000-0000-0000-000000000000/unread"
      assert:
        - "status == 200"
