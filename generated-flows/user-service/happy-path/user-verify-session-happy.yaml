flow:
  name: "User Service — Verify Session Happy Path"
  description: "GET /auth/verify with valid token returns valid=true and user_id"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-verify@example.com'"
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-verify@example.com"
          name: "Plan Verify User"
    - id: login
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/auth/login"
        headers:
          Content-Type: application/json
        body:
          email: "plan-verify@example.com"
      output:
        token: "$.body.token"

  steps:
    - id: verify_session
      action: http_request
      config:
        method: GET
        url: "${USER_SERVICE_URL}/api/v1/auth/verify"
        headers:
          Authorization: "{{token}}"
      assert:
        - "status == 200"
        - "body.valid == true"
        - "body.user_id != nil"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-verify@example.com'"
