flow:
  name: "User Service - List Users"
  description: "Creates a user, lists all users, verifies the created user appears"

  env:
    DB_URL: "postgres://root:admin@localhost:5432/postgres?sslmode=disable"
    USER_SERVICE_URL: "http://localhost:5001"

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-list-user@example.com'"

  steps:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          name: "Gen List User"
          email: "gen-list-user@example.com"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"

    - id: list_users
      action: http_request
      config:
        method: GET
        url: "${USER_SERVICE_URL}/api/v1/users"
      assert:
        - "status == 200"
        - "len(body) > 0"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-list-user@example.com'"
