flow:
  name: "User Service - Verify Auth Token"
  description: "Creates user, logs in, verifies token via GET /auth/verify"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-verify-token@example.com'"

  steps:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          name: "Verify Token User"
          email: "gen-verify-token@example.com"
      assert:
        - "status == 201"

    - id: login
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/auth/login"
        headers:
          Content-Type: application/json
        body:
          email: "gen-verify-token@example.com"
      assert:
        - "status == 200"
        - "body.token != nil"
      output:
        token: "$.body.token"

    - id: verify_token
      action: http_request
      config:
        method: GET
        url: "${USER_SERVICE_URL}/api/v1/auth/verify"
        headers:
          Authorization: "Bearer {{token}}"
      assert:
        - "status == 200"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-verify-token@example.com'"
