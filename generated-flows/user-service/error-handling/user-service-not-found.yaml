flow:
  name: "User Service - User Not Found"
  description: "Verifies GET with non-existent UUID returns 404"

  env_file: ../../.env.test

  steps:
    - id: get_nonexistent
      action: http_request
      config:
        method: GET
        url: "${USER_SERVICE_URL}/api/v1/users/00000000-0000-0000-0000-000000000000"
      assert:
        - "status == 404"
