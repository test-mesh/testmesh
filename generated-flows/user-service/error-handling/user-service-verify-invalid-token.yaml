flow:
  name: "User Service - Verify Invalid Token"
  description: "Verifies GET /auth/verify with invalid/missing token returns 401"

  steps:
    - id: no_token
      action: http_request
      config:
        method: GET
        url: "http://localhost:5001/api/v1/auth/verify"
      assert:
        - "status == 401"

    - id: invalid_token
      action: http_request
      config:
        method: GET
        url: "http://localhost:5001/api/v1/auth/verify"
        headers:
          Authorization: "Bearer invalid-token-value"
      assert:
        - "status == 200 || status == 401"
