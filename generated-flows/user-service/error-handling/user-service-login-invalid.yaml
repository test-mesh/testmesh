flow:
  name: "User Service - Login Invalid Email"
  description: "Verifies login with non-existent email returns error"

  env_file: ../../.env.test

  steps:
    - id: login_nonexistent
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/auth/login"
        headers:
          Content-Type: application/json
        body:
          email: "does-not-exist@example.com"
      assert:
        - "status == 401"
