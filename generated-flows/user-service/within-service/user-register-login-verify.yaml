flow:
  name: "User Service — Register → Login → Verify Session Chain"
  description: "Full auth lifecycle: create user, DB verify, login, Redis session verify, verify-session endpoint"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-auth-chain@example.com'"

  steps:
    - id: register
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-auth-chain@example.com"
          name: "Plan Auth Chain"
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        user_id: "$.body.id"

    - id: verify_db_after_register
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT id, email FROM user_service.users WHERE id = $1"
        params: ["{{user_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].email == 'plan-auth-chain@example.com'"

    - id: login
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/auth/login"
        headers:
          Content-Type: application/json
        body:
          email: "plan-auth-chain@example.com"
      assert:
        - "status == 200"
        - "body.token != nil"
      output:
        token: "$.body.token"

    - id: verify_session_in_redis
      action: redis.get
      config:
        host: "${REDIS_HOST}"
        port: "${REDIS_PORT}"
        key: "session:{{token}}"
      assert:
        - "value != nil"

    - id: verify_session_endpoint
      action: http_request
      config:
        method: GET
        url: "${USER_SERVICE_URL}/api/v1/auth/verify"
        headers:
          Authorization: "{{token}}"
      assert:
        - "status == 200"
        - "body.valid == true"
        - "body.user_id == '{{user_id}}'"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-auth-chain@example.com'"
