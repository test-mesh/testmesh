flow:
  name: "Recommendation Service — HTTP Get Recommendations"
  description: "GET /recommendations/:user_id returns 200 with product_ids array (may be empty)"

  env_file: ../../.env.test

  setup:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-rec-http-{{RANDOM_ID}}@example.com"
          name: "Plan Rec HTTP"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"

  steps:
    - id: get_recommendations
      action: http_request
      config:
        method: GET
        url: "${RECOMMENDATION_SERVICE_URL}/api/v1/recommendations/{{user_id}}"
      assert:
        - "status == 200"
        - "body.product_ids != nil"

  teardown:
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE id = '{{user_id}}'"
