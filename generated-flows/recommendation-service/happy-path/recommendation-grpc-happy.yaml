flow:
  name: "Recommendation Service — gRPC GetRecommendations (reflection)"
  description: "gRPC call via server reflection — returns product_ids list without error"

  env_file: ../../.env.test

  setup:
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-rec-grpc@example.com'"
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-rec-grpc@example.com"
          name: "Plan Rec gRPC"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"

  steps:
    - id: grpc_recommendations
      action: grpc
      config:
        address: "${RECOMMENDATION_GRPC_HOST}"
        service: recommendation.RecommendationService
        method: GetRecommendations
        use_reflection: true
        request:
          user_id: "{{user_id}}"
          limit: 10
      assert:
        - "body.product_ids != nil"

  teardown:
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-rec-grpc@example.com'"
