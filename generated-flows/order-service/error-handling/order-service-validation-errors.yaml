flow:
  name: "Order Service - Validation Errors"
  description: "Verifies order-service rejects invalid requests"

  env_file: ../../.env.test

  steps:
    - id: missing_user_id
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          items:
            - product_id: "00000000-0000-0000-0000-000000000001"
              quantity: 1
      assert:
        - "status == 400"

    - id: missing_items
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "00000000-0000-0000-0000-000000000001"
      assert:
        - "status == 400"

    - id: nonexistent_user
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "00000000-0000-0000-0000-000000000000"
          items:
            - product_id: "00000000-0000-0000-0000-000000000001"
              quantity: 1
      assert:
        - "status == 400"

    - id: order_not_found
      action: http_request
      config:
        method: GET
        url: "${ORDER_SERVICE_URL}/api/v1/orders/00000000-0000-0000-0000-000000000000"
      assert:
        - "status == 404"
