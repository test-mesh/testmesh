flow:
  name: "Order Service - Nonexistent Product in Order"
  description: "Verifies creating order with a valid user but nonexistent product returns error"

  env:
    DB_URL: "postgres://root:admin@localhost:5432/postgres?sslmode=disable"
    USER_SERVICE_URL: "http://localhost:5001"
    ORDER_SERVICE_URL: "http://localhost:5003"

  setup:
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-bad-product@example.com'"

  steps:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          name: "Gen Bad Product User"
          email: "gen-bad-product@example.com"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"

    - id: order_with_bad_product
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "00000000-0000-0000-0000-000000000000"
              quantity: 1
      assert:
        - "status == 400 || status == 404"

  teardown:
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-bad-product@example.com'"
