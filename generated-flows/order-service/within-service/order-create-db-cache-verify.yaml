flow:
  name: "Order Service — Create → DB Verify → Redis Cache → GET Verify"
  description: "Order creation chain: verify DB state, Redis cache, and preloaded items on GET"

  env_file: ../../.env.test

  setup:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id IN (SELECT id FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-order-chain@example.com'))"
    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-order-chain@example.com')"
    - id: cleanup_product
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Order Chain Product'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-order-chain@example.com'"
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-order-chain@example.com"
          name: "Plan Order Chain User"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Order Chain Product"
          price: 20.00
          inventory: 30
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

  steps:
    - id: create_order
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_id}}"
              quantity: 2
      assert:
        - "status == 201"
        - "body.total == 40.00"
      output:
        order_id: "$.body.id"

    - id: verify_db_order
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT * FROM order_service.orders WHERE id = $1"
        params: ["{{order_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].status == 'pending'"
        - "rows[0].total == 40.00"

    - id: verify_db_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT * FROM order_service.order_items WHERE order_id = $1"
        params: ["{{order_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].quantity == 2"
        - "rows[0].price == 20.00"

    - id: verify_redis_cache
      action: redis.get
      config:
        host: "${REDIS_HOST}"
        port: "${REDIS_PORT}"
        key: "order:{{order_id}}"
      assert:
        - "value != nil"

    - id: get_order_verify_items
      action: http_request
      config:
        method: GET
        url: "${ORDER_SERVICE_URL}/api/v1/orders/{{order_id}}"
      assert:
        - "status == 200"
        - "body.id == '{{order_id}}'"
        - "body.total == 40.00"
        - "len(body.items) == 1"
        - "body.items[0].product_id == '{{product_id}}'"
        - "body.items[0].quantity == 2"

  teardown:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id = '{{order_id}}'"
    - id: cleanup_order
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE id = '{{order_id}}'"
    - id: cleanup_product
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Order Chain Product'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-order-chain@example.com'"
