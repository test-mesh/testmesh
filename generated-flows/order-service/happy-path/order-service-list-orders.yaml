flow:
  name: "Order Service - List Orders"
  description: "Creates an order, lists all orders, verifies the created order appears"

  env_file: ../../.env.test

  setup:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.order_items
          WHERE order_id IN (
            SELECT id FROM order_service.orders
            WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-list-orders@example.com')
          )

    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.orders
          WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-list-orders@example.com')

    - id: cleanup_products
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen List Orders Product'"

    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-list-orders@example.com'"

  steps:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          name: "Gen List Orders User"
          email: "gen-list-orders@example.com"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"

    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Gen List Orders Product"
          description: "For list test"
          price: 10.00
          inventory: 50
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

    - id: create_order
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_id}}"
              quantity: 1
      assert:
        - "status == 201"
      output:
        order_id: "$.body.id"

    - id: list_orders
      action: http_request
      config:
        method: GET
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
      assert:
        - "status == 200"
        - "len(body) > 0"

  teardown:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.order_items
          WHERE order_id IN (
            SELECT id FROM order_service.orders
            WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-list-orders@example.com')
          )

    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.orders
          WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-list-orders@example.com')

    - id: cleanup_products
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen List Orders Product'"

    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-list-orders@example.com'"
