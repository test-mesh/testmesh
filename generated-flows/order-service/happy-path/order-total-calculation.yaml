flow:
  name: "Order Service — Total Calculation"
  description: "POST /orders with 3 products verifies price*quantity summing: qty=1@$10 + qty=2@$5 + qty=1@$20 = $40.00"

  env_file: ../../.env.test

  setup:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id IN (SELECT id FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-total-calc@example.com'))"
    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-total-calc@example.com')"
    - id: cleanup_product_a
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product A'"
    - id: cleanup_product_b
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product B'"
    - id: cleanup_product_c
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product C'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-total-calc@example.com'"
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-total-calc@example.com"
          name: "Plan Total Calc User"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"
    - id: create_product_a
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Calc Product A"
          price: 10.00
          inventory: 50
      assert:
        - "status == 201"
      output:
        product_id_a: "$.body.id"
    - id: create_product_b
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Calc Product B"
          price: 5.00
          inventory: 50
      assert:
        - "status == 201"
      output:
        product_id_b: "$.body.id"
    - id: create_product_c
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Calc Product C"
          price: 20.00
          inventory: 50
      assert:
        - "status == 201"
      output:
        product_id_c: "$.body.id"

  steps:
    - id: create_order
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_id_a}}"
              quantity: 1
            - product_id: "{{product_id_b}}"
              quantity: 2
            - product_id: "{{product_id_c}}"
              quantity: 1
      assert:
        - "status == 201"
        - "body.total == 40.00"
        - "len(body.items) == 3"
      output:
        order_id: "$.body.id"

  teardown:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id = '{{order_id}}'"
    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE id = '{{order_id}}'"
    - id: cleanup_product_a
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product A'"
    - id: cleanup_product_b
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product B'"
    - id: cleanup_product_c
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Calc Product C'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-total-calc@example.com'"
