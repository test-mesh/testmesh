flow:
  name: "Order Service — Create Order Happy Path"
  description: "POST /orders creates order via cross-service validation, verifies DB, Redis, Kafka"

  env_file: ../../.env.test

  setup:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id IN (SELECT id FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-order@example.com'))"
    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'plan-order@example.com')"
    - id: cleanup_product
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Order Product'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-order@example.com'"
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          email: "plan-order@example.com"
          name: "Plan Order User"
      assert:
        - "status == 201"
      output:
        user_id: "$.body.id"
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Order Product"
          price: 25.00
          inventory: 50
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

  steps:
    - id: create_order
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_id}}"
              quantity: 2
      assert:
        - "status == 201"
        - "body.id != nil"
        - "body.user_id == '{{user_id}}'"
        - "body.status == 'pending'"
        - "body.total == 50.00"
        - "len(body.items) == 1"
        - "body.items[0].quantity == 2"
      output:
        order_id: "$.body.id"

    - id: verify_db
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT * FROM order_service.orders WHERE id = $1"
        params: ["{{order_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].status == 'pending'"
        - "rows[0].total == 50.00"

    - id: verify_redis
      action: redis.get
      config:
        host: "${REDIS_HOST}"
        port: "${REDIS_PORT}"
        key: "order:{{order_id}}"
      assert:
        - "value != nil"

    - id: verify_kafka
      action: kafka_consumer
      config:
        brokers: "${KAFKA_BROKERS}"
        topic: order.placed
        group_id: "testmesh-plan-order-create-{{RANDOM_ID}}"
        auto_offset_reset: "earliest"
        from_beginning: true
        timeout: "10s"
        count: 1
      assert:
        - "len(messages) > 0"

  teardown:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.order_items WHERE order_id = '{{order_id}}'"
    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM order_service.orders WHERE id = '{{order_id}}'"
    - id: cleanup_product
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Order Product'"
    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'plan-order@example.com'"
