flow:
  name: "Edge Case — Concurrent Inventory Lock (One 409)"
  description: "Two simultaneous PUT /inventory requests for same product; Redis distributed lock means one wins (200) and one loses (409)"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Concurrent Lock'"
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Concurrent Lock"
          price: 10.00
          inventory: 100
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        product_id: "$.body.id"

  steps:
    # NOTE: The parallel action fires both requests simultaneously.
    # TestMesh does not support per-step assertions inside parallel blocks.
    # After execution, verify via get_execution that one step returned 200 and one returned 409.
    # This limitation is documented in the gap analysis.
    - id: fire_both
      action: parallel
      config:
        branches:
          - steps:
              - id: request_a
                action: http_request
                config:
                  method: PUT
                  url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/inventory"
                  headers:
                    Content-Type: application/json
                  body:
                    inventory: 90
          - steps:
              - id: request_b
                action: http_request
                config:
                  method: PUT
                  url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/inventory"
                  headers:
                    Content-Type: application/json
                  body:
                    inventory: 80

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Concurrent Lock'"
