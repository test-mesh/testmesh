flow:
  name: "E2E — Recommendations After Purchase (gRPC)"
  description: >
    Create user, create 2 products, place orders for both, wait for recommendation-service
    to write Neo4j PURCHASED edges (via Kafka consumer), then call gRPC GetRecommendations
    and verify product_ids are returned.

  env_file: ../../.env.test

  setup:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.order_items
          WHERE order_id IN (
            SELECT id FROM order_service.orders
            WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-reco-purchase@example.com')
          )

    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.orders
          WHERE user_id IN (SELECT id::text FROM user_service.users WHERE email = 'gen-reco-purchase@example.com')

    - id: cleanup_products
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name IN ('Reco Product A', 'Reco Product B')"

    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-reco-purchase@example.com'"

  steps:
    - id: create_user
      action: http_request
      config:
        method: POST
        url: "${USER_SERVICE_URL}/api/v1/users"
        headers:
          Content-Type: application/json
        body:
          name: "Gen Reco Purchase User"
          email: "gen-reco-purchase@example.com"
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        user_id: "$.body.id"

    - id: create_product_a
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Reco Product A"
          description: "Product A for recommendation test"
          price: 25.00
          inventory: 50
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        product_a_id: "$.body.id"

    - id: create_product_b
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Reco Product B"
          description: "Product B for recommendation test"
          price: 40.00
          inventory: 30
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        product_b_id: "$.body.id"

    - id: place_order_a
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_a_id}}"
              quantity: 1
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        order_a_id: "$.body.id"

    - id: place_order_b
      action: http_request
      config:
        method: POST
        url: "${ORDER_SERVICE_URL}/api/v1/orders"
        headers:
          Content-Type: application/json
        body:
          user_id: "{{user_id}}"
          items:
            - product_id: "{{product_b_id}}"
              quantity: 1
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        order_b_id: "$.body.id"

    # Workaround: TestMesh has no native sleep action.
    # This db_poll with a trivial query and 3s timeout acts as a 3-second delay,
    # giving the recommendation-service Kafka consumer time to write PURCHASED
    # edges to Neo4j before the gRPC call.
    - id: wait_for_neo4j_writes
      action: db_poll
      config:
        connection: "${DB_URL}"
        query: "SELECT 1"
        poll_interval: "3s"
        timeout: "3s"
        expected_rows: 1

    - id: get_grpc_recommendations
      action: grpc
      config:
        host: "${RECOMMENDATION_GRPC_HOST}"
        service: RecommendationService
        method: GetRecommendations
        request:
          user_id: "{{user_id}}"
          limit: 10
      assert:
        - "body.product_ids != nil"
        - "len(body.product_ids) > 0"

  teardown:
    - id: cleanup_order_items
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.order_items
          WHERE order_id IN ('{{order_a_id}}', '{{order_b_id}}')

    - id: cleanup_orders
      action: database_query
      config:
        connection: "${DB_URL}"
        query: >
          DELETE FROM order_service.orders
          WHERE id IN ('{{order_a_id}}', '{{order_b_id}}')

    - id: cleanup_products
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name IN ('Reco Product A', 'Reco Product B')"

    - id: cleanup_user
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM user_service.users WHERE email = 'gen-reco-purchase@example.com'"
