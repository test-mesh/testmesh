flow:
  name: "Product Service — Create Product Happy Path"
  description: "POST /products returns 201, verifies DB, Redis cache, Kafka event"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Test Product'"

  steps:
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Test Product"
          description: "A product for plan testing"
          price: 49.99
          inventory: 100
      assert:
        - "status == 201"
        - "body.id != nil"
        - "body.name == 'Plan Test Product'"
        - "body.price == 49.99"
        - "body.inventory == 100"
      output:
        product_id: "$.body.id"

    - id: verify_db
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT * FROM product_service.products WHERE id = $1"
        params: ["{{product_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].name == 'Plan Test Product'"
        - "rows[0].price == 49.99"
        - "rows[0].inventory == 100"

    - id: verify_redis
      action: redis.get
      config:
        host: "${REDIS_HOST}"
        port: "${REDIS_PORT}"
        key: "product:{{product_id}}"
      assert:
        - "value != nil"

    - id: verify_kafka
      action: kafka_consumer
      config:
        brokers: "${KAFKA_BROKERS}"
        topic: product.created
        group_id: "testmesh-plan-product-create-{{RANDOM_ID}}"
        auto_offset_reset: "earliest"
        from_beginning: true
        timeout: "10s"
        count: 1
      assert:
        - "len(messages) > 0"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Test Product'"
