flow:
  name: "Product Service - List Products"
  description: "Creates a product, lists all, verifies it appears"

  env:
    DB_URL: "postgres://root:admin@localhost:5432/postgres?sslmode=disable"
    PRODUCT_SERVICE_URL: "http://localhost:5002"

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen List Product'"

  steps:
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Gen List Product"
          description: "For list test"
          price: 5.00
          inventory: 10
      assert:
        - "status == 201"

    - id: list_products
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
      assert:
        - "status == 200"
        - "len(body) > 0"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen List Product'"
