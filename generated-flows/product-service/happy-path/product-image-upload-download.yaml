flow:
  name: "Product Service — Image Upload and Download"
  description: "POST /products/:id/image uploads to MinIO, GET /products/:id/image returns presigned URL. Requires MinIO running."

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Image Product'"
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Image Product"
          price: 20.00
          inventory: 5
      output:
        product_id: "$.body.id"

  steps:
    - id: upload_image
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/image"
        headers:
          Content-Type: multipart/form-data
        body:
          image: "fake-image-data"
      assert:
        - "status == 200 || status == 503"

    - id: get_image_url
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/image"
      assert:
        - "status == 200 || status == 404 || status == 503"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Image Product'"
