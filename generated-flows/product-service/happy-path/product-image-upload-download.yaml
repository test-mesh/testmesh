flow:
  name: "Product Service — Image Endpoints Are Registered and Validate Input"
  description: >
    Verifies that POST /products/:id/image and GET /products/:id/image are registered.
    POST with a non-multipart body returns 400 (image file required).
    GET before any upload returns 404 (no image for this product).
    Note: full upload/download cannot be tested via http_request (requires multipart form data).

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Image Product'"
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Image Product"
          price: 20.00
          inventory: 5
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

  steps:
    - id: upload_no_file
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/image"
        headers:
          Content-Type: application/json
        body:
          placeholder: "not a multipart form"
      assert:
        - "status == 400"
        - "body.error == 'image file required'"

    - id: get_image_not_found
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/image"
      assert:
        - "status == 404"
        - "body.error == 'no image for this product'"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Image Product'"
