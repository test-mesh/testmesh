flow:
  name: "Product Service — Get Product Happy Path"
  description: "GET /products/:id returns 200 with all fields"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Get Product'"
    - id: create
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Get Product"
          price: 15.00
          inventory: 10
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

  steps:
    - id: get_product
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}"
      assert:
        - "status == 200"
        - "body.id == product_id"
        - "body.name == 'Plan Get Product'"
        - "body.price == 15.00"
        - "body.inventory == 10"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Get Product'"
