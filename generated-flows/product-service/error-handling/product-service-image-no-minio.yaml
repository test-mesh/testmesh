flow:
  name: "Product Service - Image Upload Without MinIO"
  description: "Verifies image endpoints return 503 when MinIO storage is unavailable"

  env:
    DB_URL: "postgres://root:admin@localhost:5432/postgres?sslmode=disable"
    PRODUCT_SERVICE_URL: "http://localhost:5002"

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen Image Test Product'"

  steps:
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Gen Image Test Product"
          description: "For image test"
          price: 10.00
          inventory: 5
      assert:
        - "status == 201"
      output:
        product_id: "$.body.id"

    - id: get_image_no_storage
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/image"
      assert:
        - "status == 503 || status == 404"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Gen Image Test Product'"
