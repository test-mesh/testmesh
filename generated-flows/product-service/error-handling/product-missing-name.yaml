flow:
  name: "Product Service — Missing Name Returns 400"
  description: "POST /products without required name field returns 400"

  env_file: ../../.env.test

  steps:
    - id: no_name
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          price: 10.00
          inventory: 5
      assert:
        - "status == 400"
        - "body.error != nil"
