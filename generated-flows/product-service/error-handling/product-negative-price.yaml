flow:
  name: "Product Service — Zero or Negative Price Returns 400"
  description: "POST /products with price <= 0 fails validation"

  env_file: ../../.env.test

  steps:
    - id: zero_price
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Zero Price Product"
          price: 0
          inventory: 10
      assert:
        - "status == 400"
        - "body.error != nil"

    - id: negative_price
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Negative Price Product"
          price: -5.00
          inventory: 10
      assert:
        - "status == 400"
        - "body.error != nil"
