flow:
  name: "Product Service — Inventory Update → Kafka Event → Cache Invalidation"
  description: "Update inventory triggers Kafka event and deletes Redis cache key"

  env_file: ../../.env.test

  setup:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Inventory Chain Product'"

  steps:
    - id: create_product
      action: http_request
      config:
        method: POST
        url: "${PRODUCT_SERVICE_URL}/api/v1/products"
        headers:
          Content-Type: application/json
        body:
          name: "Plan Inventory Chain Product"
          price: 15.00
          inventory: 100
      assert:
        - "status == 201"
        - "body.id != nil"
      output:
        product_id: "$.body.id"

    - id: seed_cache
      action: http_request
      config:
        method: GET
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}"
      assert:
        - "status == 200"

    - id: update_inventory
      action: http_request
      config:
        method: PUT
        url: "${PRODUCT_SERVICE_URL}/api/v1/products/{{product_id}}/inventory"
        headers:
          Content-Type: application/json
        body:
          inventory: 75
      assert:
        - "status == 200"

    - id: verify_db_inventory
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "SELECT inventory FROM product_service.products WHERE id = $1"
        params: ["{{product_id}}"]
      assert:
        - "row_count == 1"
        - "rows[0].inventory == 75"

    - id: verify_kafka_event
      action: kafka_consumer
      config:
        brokers: "${KAFKA_BROKERS}"
        topic: product.inventory.changed
        group_id: "testmesh-plan-inventory-chain-{{RANDOM_ID}}"
        auto_offset_reset: "earliest"
        from_beginning: true
        timeout: "10s"
        count: 1
      assert:
        - "len(messages) > 0"
        - "messages[0].value.product_id == '{{product_id}}'"

    - id: verify_cache_invalidated
      action: redis.get
      config:
        host: "${REDIS_HOST}"
        port: "${REDIS_PORT}"
        key: "product:{{product_id}}"
      assert:
        - "value == nil"

  teardown:
    - id: cleanup
      action: database_query
      config:
        connection: "${DB_URL}"
        query: "DELETE FROM product_service.products WHERE name = 'Plan Inventory Chain Product'"
